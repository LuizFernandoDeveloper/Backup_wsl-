<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mega Backup WSL</title>
  <desc id="desc">Dark technical banner for Mega Backup WSL with template health gates, resumable backup and SHA-256 validation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04111f"/>
      <stop offset="0.45" stop-color="#07233a"/>
      <stop offset="1" stop-color="#03070d"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13d6ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#13d6ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#13d6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.75 0 0 0 0 1 0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="#01040a" opacity="0.22"/>

  <g opacity="0.35">
    <path d="M0 64H1280" stroke="#19c7ff" stroke-opacity="0.18"/>
    <path d="M0 112H1280" stroke="#19c7ff" stroke-opacity="0.12"/>
    <path d="M0 214H1280" stroke="#19c7ff" stroke-opacity="0.15"/>
    <path d="M0 298H1280" stroke="#19c7ff" stroke-opacity="0.10"/>
    <path d="M128 0V360" stroke="#19c7ff" stroke-opacity="0.08"/>
    <path d="M384 0V360" stroke="#19c7ff" stroke-opacity="0.07"/>
    <path d="M896 0V360" stroke="#19c7ff" stroke-opacity="0.08"/>
    <path d="M1130 0V360" stroke="#19c7ff" stroke-opacity="0.07"/>
  </g>

  <g opacity="0.5">
    <rect x="54" y="44" width="180" height="3" rx="1.5" fill="#1bd9ff"/>
    <rect x="54" y="58" width="104" height="3" rx="1.5" fill="#1bd9ff" opacity="0.45"/>
    <rect x="1005" y="70" width="182" height="3" rx="1.5" fill="#1bd9ff"/>
    <rect x="1084" y="84" width="103" height="3" rx="1.5" fill="#1bd9ff" opacity="0.45"/>
    <rect x="913" y="270" width="214" height="3" rx="1.5" fill="#1bd9ff" opacity="0.6"/>
    <rect x="100" y="276" width="254" height="3" rx="1.5" fill="#1bd9ff" opacity="0.35"/>
  </g>

  <g opacity="0.18">
    <text x="56" y="146" fill="#86eaff" font-family="Consolas, Monaco, monospace" font-size="17">wsl.exe --export distro backup.tar</text>
    <text x="56" y="176" fill="#86eaff" font-family="Consolas, Monaco, monospace" font-size="17">SHA256: validated</text>
    <text x="948" y="154" fill="#86eaff" font-family="Consolas, Monaco, monospace" font-size="17">QualityGate=Template</text>
    <text x="948" y="184" fill="#86eaff" font-family="Consolas, Monaco, monospace" font-size="17">Resume: enabled</text>
  </g>

  <ellipse cx="640" cy="180" rx="480" ry="118" fill="url(#scan)" opacity="0.22" filter="url(#softGlow)"/>

  <text x="640" y="144" text-anchor="middle" fill="#f6fbff" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="0">Mega Backup WSL</text>
  <text x="640" y="204" text-anchor="middle" fill="#9cecff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600" letter-spacing="0">Templates saudaveis, backup retomavel e validacao SHA-256</text>

  <g transform="translate(318 250)">
    <rect width="150" height="34" rx="8" fill="#10263a" stroke="#2bd8ff" stroke-opacity="0.55"/>
    <text x="75" y="23" text-anchor="middle" fill="#e9fbff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">WSL 2</text>
  </g>
  <g transform="translate(490 250)">
    <rect width="150" height="34" rx="8" fill="#10263a" stroke="#2bd8ff" stroke-opacity="0.55"/>
    <text x="75" y="23" text-anchor="middle" fill="#e9fbff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">PowerShell</text>
  </g>
  <g transform="translate(662 250)">
    <rect width="150" height="34" rx="8" fill="#10263a" stroke="#2bd8ff" stroke-opacity="0.55"/>
    <text x="75" y="23" text-anchor="middle" fill="#e9fbff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Health Gates</text>
  </g>
  <g transform="translate(834 250)">
    <rect width="150" height="34" rx="8" fill="#10263a" stroke="#2bd8ff" stroke-opacity="0.55"/>
    <text x="75" y="23" text-anchor="middle" fill="#e9fbff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">MIT</text>
  </g>
</svg>
